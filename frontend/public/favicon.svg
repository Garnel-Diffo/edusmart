<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Mortarboard top board (diamond / rhombus) -->
  <!-- Center (50,38) half-width 31 half-height 17 -->
  <polygon points="50,21 81,38 50,55 19,38" fill="white"/>

  <!-- Cap band (cylinder base below diamond) -->
  <rect x="33" y="55" width="34" height="14" rx="4" fill="rgba(255,255,255,0.88)"/>
  <!-- Bottom curve of band -->
  <ellipse cx="50" cy="69" rx="17" ry="4.5" fill="rgba(255,255,255,0.72)"/>

  <!-- Tassel cord from right corner of diamond -->
  <line x1="81" y1="38" x2="81" y2="72"
        stroke="rgba(255,255,255,0.72)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Tassel end (golden) -->
  <rect x="74" y="72" width="14" height="9" rx="3" fill="#fbbf24"/>

  <!-- AI sparkle / 4-pointed star (upper-right corner) -->
  <!-- Center (84,17) outer-r=7 inner-r=3 -->
  <path d="M84,10 L86,15 L91,17 L86,19 L84,24 L82,19 L77,17 L82,15 Z"
        fill="#93c5fd" opacity="0.93"/>
</svg>
