name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (Node/Express)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      API_BASE_URL: http://localhost:4000
      FRONTEND_URL: http://localhost:3000
      JWT_ACCESS_SECRET: ci-access-secret-32-characters-minimum
      JWT_REFRESH_SECRET: ci-refresh-secret-32-characters-minimum
      CLOUDINARY_CLOUD_NAME: ci
      CLOUDINARY_API_KEY: ci
      CLOUDINARY_API_SECRET: ci
      BREVO_API_KEY: ci
      BREVO_SENDER_EMAIL: ci@edusmart.test
      AI_SERVICE_URL: http://localhost:8000
      AI_SERVICE_SECRET: ci-internal-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  ai-service:
    name: Service IA (Python/FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      INTERNAL_SECRET: ci-internal-secret
      BACKEND_URL: http://localhost:4000
      GROQ_API_KEY: ci-placeholder-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
      - run: ruff check .
      - run: pytest

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
